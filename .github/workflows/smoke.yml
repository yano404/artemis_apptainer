name: CI smoke test (ghcr plumbing)

# Throwaway pipeline check: builds a tiny image and pushes it to ghcr.io as
# the `ci-smoke` tag, to validate setup-apptainer / sudo build / ghcr login /
# oras push without waiting for the full ROOT + Artemis build. Delete this
# workflow (and the ci-smoke package tag) once publish.yml is proven.
on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  smoke:
    runs-on: ubuntu-24.04
    steps:
      - name: Set up Apptainer
        uses: eWaterCycle/setup-apptainer@v2

      - name: Write a minimal definition
        run: |
          cat > smoke.def <<'EOF'
          Bootstrap: docker
          From: alpine:3.20
          %runscript
            exec echo "ci smoke ok"
          EOF

      - name: Build minimal image
        run: |
          APPTAINER="$(command -v apptainer)"
          sudo "$APPTAINER" build smoke.sif smoke.def
          sudo chown "$(id -u):$(id -g)" smoke.sif

      - name: Log in to ghcr.io
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | apptainer registry login --username "${{ github.actor }}" --password-stdin oras://ghcr.io

      - name: Push smoke image
        run: |
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}"
          apptainer push smoke.sif "oras://${IMAGE}:ci-smoke"
          echo "Pushed \`oras://${IMAGE}:ci-smoke\`" >> "$GITHUB_STEP_SUMMARY"
